<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Shot Reference Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  :root{
    --bg:#0c0b0a; --panel:#161412; --panel2:#1d1a17; --chip:#221f1b;
    --border:#2d2924; --borderHi:#3d372f;
    --text:#f1ece2; --textMute:#a89e8e; --textDim:#6e655a;
    --accent:#d98e3f; --accent2:#e8a85e;
    --danger:#e0654f; --success:#5fb78a; --info:#6ba3d6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Geist Mono',monospace;height:100%;overflow:hidden;}
  #root{height:100vh;}
  img{-webkit-user-drag:none;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  input,select,button{font-family:inherit;}
  button{cursor:pointer;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

/* ═══════════════════════════════════════════════════════════
   FILENAME PARSER
   Handles: "60_3_cu_hand_on_static.png", "S60_3_desc.png",
   "Scene 60_3 desc.png", "60-3-desc.png"
═══════════════════════════════════════════════════════════ */
function parseFilename(name){
  const base = name.replace(/\.[^.]+$/, '');
  let s = base.replace(/^scene\s*/i, '').replace(/^s(?=\d)/i, '');
  s = s.replace(/[\s\-]+/g, '_');
  const m = s.match(/^(\d+)[_]+(\d+)[_]*(.*)$/);
  if(m){
    return {
      sceneNum: parseInt(m[1], 10),
      shotNum: parseInt(m[2], 10),
      desc: (m[3]||'').replace(/_/g,' ').trim(),
      raw: name, valid: true
    };
  }
  const m2 = s.match(/^(\d+)[_]*(.*)$/);
  if(m2){
    return {
      sceneNum: parseInt(m2[1],10), shotNum: 0,
      desc:(m2[2]||'').replace(/_/g,' ').trim(),
      raw:name, valid:true
    };
  }
  return { sceneNum: null, shotNum: 0, desc: base, raw: name, valid: false };
}

const IMG_EXT = /\.(jpg|jpeg|png|gif|webp|heic|bmp)$/i;

/* ═══════════════════════════════════════════════════════════
   MAIN APP (iPad-compatible: uses plain <input multiple>
   instead of webkitdirectory, which is unreliable on iOS
   Safari. User browses to the folder in Files app and
   multi-selects all images inside. Filenames are preserved
   when images live in Files (not Photos, which rewrites names).
═══════════════════════════════════════════════════════════ */
function App(){
  const [shots, setShots] = React.useState([]); // {parsed, url, name}
  const [loading, setLoading] = React.useState(false);
  const [loadMsg, setLoadMsg] = React.useState('');
  const [hasLoaded, setHasLoaded] = React.useState(false);
  const [selScene, setSelScene] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [lightbox, setLightbox] = React.useState(null);
  const fileInputRef = React.useRef(null);

  function pickFiles(){
    fileInputRef.current?.click();
  }

  async function handleFilesSelected(e){
    const fileList = Array.from(e.target.files || []);
    const imageFiles = fileList.filter(f => IMG_EXT.test(f.name));
    if(imageFiles.length === 0){
      setLoadMsg('No images found in selection');
      return;
    }
    setLoading(true);
    setLoadMsg(`Loading ${imageFiles.length} images...`);

    const parsed = [];
    for(let i=0; i<imageFiles.length; i++){
      const file = imageFiles[i];
      const url = URL.createObjectURL(file);
      parsed.push({ ...parseFilename(file.name), url, name: file.name });
      if(i % 20 === 0) setLoadMsg(`Loading ${i+1}/${imageFiles.length}...`);
    }

    // Merge with existing shots, deduplicate by filename, then sort
    setShots(prev => {
      const existingNames = new Set(prev.map(s => s.name));
      const newShots = parsed.filter(s => !existingNames.has(s.name));
      const merged = [...prev, ...newShots];
      merged.sort((a,b)=>{
        const sa = a.sceneNum ?? 99999, sb = b.sceneNum ?? 99999;
        if(sa !== sb) return sa - sb;
        return (a.shotNum||0) - (b.shotNum||0);
      });
      return merged;
    });
    setHasLoaded(true);
    setLoading(false);
    // Reset input so selecting again fires onChange
    e.target.value = '';
  }

  const sceneNumbers = React.useMemo(()=>{
    const set = new Set(shots.map(s=>s.sceneNum).filter(n=>n!=null));
    return Array.from(set).sort((a,b)=>a-b);
  },[shots]);

  const filtered = React.useMemo(()=>{
    let list = shots;
    if(selScene!=='all') list = list.filter(s=>s.sceneNum===Number(selScene));
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(s=>
        String(s.sceneNum).includes(q) ||
        (s.desc||'').toLowerCase().includes(q) ||
        (s.name||'').toLowerCase().includes(q)
      );
    }
    return list;
  },[shots, selScene, search]);

  // Hidden file input - works on iPad Safari (shows Files app picker with folder support)
  const fileInputEl = (
    <input ref={fileInputRef} type="file" multiple accept="image/*"
      onChange={handleFilesSelected} style={{display:'none'}}/>
  );

  if(!hasLoaded){
    return (
      <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:30}}>
        {fileInputEl}
        <div style={{maxWidth:380,textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:16,opacity:0.3}}>🎞</div>
          <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:28,marginBottom:8}}>
            Shot Reference Viewer
          </div>
          <div style={{fontSize:12,color:'var(--textDim)',marginBottom:24,lineHeight:1.6}}>
            Tap below, choose "Browse" to find your folder in Files,
            then select all images inside (tap Select, then tap each
            image or "Select All"). Filenames like "60_3_description.png"
            auto-link to Scene 60, Shot 3.
          </div>
          {loading ? (
            <div style={{fontSize:12,color:'var(--textMute)'}}>{loadMsg}</div>
          ) : (
            <button onClick={pickFiles}
              style={{padding:'12px 28px',background:'var(--accent)',border:'none',
                borderRadius:8,color:'#15110a',fontSize:13,fontWeight:600}}>
              Select Images
            </button>
          )}
          {loadMsg && !loading && (
            <div style={{fontSize:11,color:'var(--danger)',marginTop:10}}>{loadMsg}</div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',animation:'fadeIn 0.25s ease'}}>
      {fileInputEl}

      {/* Header */}
      <div style={{flexShrink:0,borderBottom:'1px solid var(--border)',padding:'14px 16px',
        display:'flex',alignItems:'center',gap:12,flexWrap:'wrap',background:'var(--panel)'}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,flexShrink:0}}>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:20,color:'var(--text)'}}>
            Shot Reference
          </span>
          <span style={{fontSize:9,color:'var(--textDim)'}}>{shots.length} IMAGES</span>
        </div>

        <div style={{flex:1,minWidth:160,order:3}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search scene, shot, description..."
            style={{width:'100%',background:'var(--panel2)',border:'1px solid var(--border)',
              borderRadius:7,padding:'7px 12px',fontSize:12,color:'var(--text)',outline:'none'}}/>
        </div>

        <select value={selScene} onChange={e=>{setSelScene(e.target.value); setSearch('');}}
          style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:7,
            padding:'7px 10px',fontSize:12,color:'var(--text)',flexShrink:0}}>
          <option value="all">All scenes ({sceneNumbers.length})</option>
          {sceneNumbers.map(n=>{
            const count = shots.filter(s=>s.sceneNum===n).length;
            return <option key={n} value={n}>Scene {n} ({count})</option>;
          })}
        </select>

        <button onClick={pickFiles}
          style={{flexShrink:0,padding:'7px 12px',background:'transparent',
            border:'1px solid var(--border)',borderRadius:7,color:'var(--textMute)',fontSize:11}}>
          + Add more
        </button>
        <button onClick={()=>{
            setShots(prev=>{ prev.forEach(s=>URL.revokeObjectURL(s.url)); return []; });
            setHasLoaded(false);
          }}
          style={{flexShrink:0,padding:'7px 12px',background:'transparent',
            border:'1px solid var(--border)',borderRadius:7,color:'var(--textDim)',fontSize:11}}>
          Clear all
        </button>
      </div>

      {/* Scene quick-jump strip */}
      {sceneNumbers.length>0 && (
        <div style={{flexShrink:0,borderBottom:'1px solid var(--border)',
          padding:'8px 16px',display:'flex',gap:5,overflowX:'auto',background:'var(--bg)',
          WebkitOverflowScrolling:'touch'}}>
          <button onClick={()=>setSelScene('all')}
            style={{padding:'4px 12px',borderRadius:99,fontSize:11,whiteSpace:'nowrap',flexShrink:0,
              background:selScene==='all'?'var(--accent)':'transparent',
              border:`1px solid ${selScene==='all'?'var(--accent)':'var(--border)'}`,
              color:selScene==='all'?'#15110a':'var(--textMute)'}}>
            ALL
          </button>
          {sceneNumbers.map(n=>(
            <button key={n} onClick={()=>setSelScene(String(n))}
              style={{padding:'4px 12px',borderRadius:99,fontSize:11,whiteSpace:'nowrap',flexShrink:0,
                background:selScene===String(n)?'var(--accent)':'transparent',
                border:`1px solid ${selScene===String(n)?'var(--accent)':'var(--border)'}`,
                color:selScene===String(n)?'#15110a':'var(--textMute)'}}>
              S{n}
            </button>
          ))}
        </div>
      )}

      {/* Grid */}
      <div style={{flex:1,overflow:'auto',padding:'14px 16px',WebkitOverflowScrolling:'touch'}}>
        {filtered.length===0 && (
          <div style={{textAlign:'center',padding:60,color:'var(--textDim)'}}>
            <div style={{fontSize:36,opacity:0.2,marginBottom:8}}>🎞</div>
            <div style={{fontSize:13}}>
              {shots.length===0 ? 'No images found in this folder' : 'No matches found'}
            </div>
          </div>
        )}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10}}>
          {filtered.map((shot, idx)=>(
            <ShotThumb key={shot.url+idx} shot={shot} onClick={()=>setLightbox(idx)}/>
          ))}
        </div>
      </div>

      {lightbox!==null && (
        <Lightbox shots={filtered} index={lightbox}
          onClose={()=>setLightbox(null)} onNav={setLightbox}/>
      )}
    </div>
  );
}

function ShotThumb({shot, onClick}){
  return (
    <div onClick={onClick} style={{cursor:'pointer',animation:'slideUp 0.2s ease'}}>
      <div style={{position:'relative',aspectRatio:'16/9',borderRadius:8,overflow:'hidden',
        background:'var(--panel2)',border:'1px solid var(--border)'}}>
        <img src={shot.url} alt={shot.desc} loading="lazy"
          style={{width:'100%',height:'100%',objectFit:'cover'}}/>
        <div style={{position:'absolute',top:6,left:6,background:'rgba(12,11,10,0.85)',
          borderRadius:4,padding:'2px 7px',fontSize:9,color:'var(--accent2)',fontWeight:600}}>
          {shot.sceneNum!=null ? `S${shot.sceneNum}${shot.shotNum?'.'+shot.shotNum:''}` : '?'}
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--textMute)',marginTop:5,
        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textTransform:'lowercase'}}>
        {shot.desc || shot.name}
      </div>
    </div>
  );
}

function Lightbox({shots, index, onClose, onNav}){
  const shot = shots[index];
  const touchStart = React.useRef(null);

  React.useEffect(()=>{
    function onKey(e){
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft' && index>0) onNav(index-1);
      if(e.key==='ArrowRight' && index<shots.length-1) onNav(index+1);
    }
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[index, shots.length]);

  function onTouchStart(e){ touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e){
    if(touchStart.current==null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if(dx > 60 && index>0) onNav(index-1);
    if(dx < -60 && index<shots.length-1) onNav(index+1);
    touchStart.current = null;
  }

  if(!shot) return null;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.97)',zIndex:9000,
      display:'flex',flexDirection:'column',animation:'fadeIn 0.15s ease'}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

      <div style={{flexShrink:0,padding:'12px 16px',
        paddingTop:'max(12px,env(safe-area-inset-top))',
        display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:'var(--accent2)',fontWeight:600}}>
            {shot.sceneNum!=null ? `SCENE ${shot.sceneNum}${shot.shotNum?` · SHOT ${shot.shotNum}`:''}` : 'UNKNOWN SCENE'}
          </div>
          <div style={{fontSize:13,color:'var(--textMute)',marginTop:2,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {shot.desc || shot.name}
          </div>
        </div>
        <div style={{fontSize:10,color:'var(--textDim)',flexShrink:0}}>{index+1} / {shots.length}</div>
        <button onClick={onClose}
          style={{flexShrink:0,width:34,height:34,borderRadius:'50%',background:'var(--panel2)',
            border:'1px solid var(--border)',color:'var(--textMute)',fontSize:16,
            display:'grid',placeItems:'center'}}>x</button>
      </div>

      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
        position:'relative',overflow:'hidden',padding:'0 80px'}}>
        {index>0 && (
          <button onClick={()=>onNav(index-1)}
            style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',
              width:48,height:48,borderRadius:'50%',background:'var(--panel2)',
              border:'1px solid var(--border)',color:'var(--text)',fontSize:20,
              display:'grid',placeItems:'center',zIndex:10}}>‹</button>
        )}
        <img src={shot.url} alt={shot.desc}
          style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:4}}/>
        {index<shots.length-1 && (
          <button onClick={()=>onNav(index+1)}
            style={{position:'absolute',right:16,top:'50%',transform:'translateY(-50%)',
              width:48,height:48,borderRadius:'50%',background:'var(--panel2)',
              border:'1px solid var(--border)',color:'var(--text)',fontSize:20,
              display:'grid',placeItems:'center',zIndex:10}}>›</button>
        )}
      </div>

      {/* Touch-friendly bottom nav */}
      <div style={{flexShrink:0,padding:'10px 16px',
        paddingBottom:'max(10px,env(safe-area-inset-bottom))',
        display:'flex',gap:10}}>
        <button onClick={()=>index>0&&onNav(index-1)} disabled={index===0}
          style={{flex:1,padding:'12px 0',background:'var(--panel2)',
            border:'1px solid var(--border)',borderRadius:8,
            color: index===0?'var(--textDim)':'var(--text)',fontSize:14}}>
          ‹ Prev
        </button>
        <button onClick={()=>index<shots.length-1&&onNav(index+1)} disabled={index===shots.length-1}
          style={{flex:1,padding:'12px 0',background:'var(--panel2)',
            border:'1px solid var(--border)',borderRadius:8,
            color: index===shots.length-1?'var(--textDim)':'var(--text)',fontSize:14}}>
          Next ›
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
