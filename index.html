const GALLERY_PASSWORD = "fracturedmind"; // simple shared password
const SESSION_KEY = "sb_gallery_unlocked";

/* ═══════════════════════════════════════════════════════════
   FILENAME PARSER
   Handles: "60_3_cu_hand_on_static.png", "S60_3_desc.png",
   "Scene 60_3 desc.png", "60-3-desc.png"
═══════════════════════════════════════════════════════════ */
function parseFilename(name){
  const base = name.replace(/\.[^.]+$/, ''); // strip extension
  // Normalize: remove "Scene", "S" prefix variants, replace separators
  let s = base.replace(/^scene\s*/i, '').replace(/^s(?=\d)/i, '');
  s = s.replace(/[\s\-]+/g, '_');
  const m = s.match(/^(\d+)[_]+(\d+)[_]*(.*)$/);
  if(m){
    const sceneNum = parseInt(m[1], 10);
    const shotNum = parseInt(m[2], 10);
    const desc = (m[3]||'').replace(/_/g,' ').trim();
    return { sceneNum, shotNum, desc, raw: name, valid: true };
  }
  // Fallback: just a scene number, no shot
  const m2 = s.match(/^(\d+)[_]*(.*)$/);
  if(m2){
    return { sceneNum: parseInt(m2[1],10), shotNum: 0, desc:(m2[2]||'').replace(/_/g,' ').trim(), raw:name, valid:true };
  }
  return { sceneNum: null, shotNum: 0, desc: base, raw: name, valid: false };
}

/* ═══════════════════════════════════════════════════════════
   PASSWORD GATE
═══════════════════════════════════════════════════════════ */
function PasswordGate({onUnlock}){
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState(false);

  function submit(e){
    e.preventDefault();
    if(pw === GALLERY_PASSWORD){
      sessionStorage.setItem(SESSION_KEY, '1');
      onUnlock();
    } else {
      setErr(true);
      setTimeout(()=>setErr(false), 1500);
    }
  }

  return (
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
      background:'var(--bg)',padding:20}}>
      <form onSubmit={submit} style={{width:'100%',maxWidth:340,textAlign:'center'}}>
        <div style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',fontSize:32,
          color:'var(--text)',marginBottom:6}}>Shot Reference</div>
        <div style={{fontSize:11,color:'var(--textDim)',letterSpacing:'0.08em',marginBottom:28}}>
          FRACTURED MIND
        </div>
        <input
          type="password" value={pw} onChange={e=>setPw(e.target.value)}
          placeholder="Enter password" autoFocus
          style={{width:'100%',background:'var(--panel)',border:`1px solid ${err?'var(--danger)':'var(--border)'}`,
            borderRadius:8,padding:'12px 14px',fontSize:14,color:'var(--text)',
            textAlign:'center',outline:'none',transition:'border-color 0.15s'}}/>
        {err && <div style={{fontSize:11,color:'var(--danger)',marginTop:8}}>Incorrect password</div>}
        <button type="submit"
          style={{width:'100%',marginTop:14,padding:'11px 0',background:'var(--accent)',
            border:'none',borderRadius:8,color:'#15110a',fontSize:13,fontWeight:600,
            letterSpacing:'0.02em'}}>
          Enter
        </button>
      </form>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════ */
function App(){
  const [unlocked, setUnlocked] = React.useState(()=>sessionStorage.getItem(SESSION_KEY)==='1');
  if(!unlocked) return <PasswordGate onUnlock={()=>setUnlocked(true)}/>;
  return <Gallery/>;
}

function Gallery(){
  const [shots, setShots] = React.useState([]); // [{sceneNum,shotNum,desc,url,path,id}]
  const [loading, setLoading] = React.useState(true);
  const [selScene, setSelScene] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [lightbox, setLightbox] = React.useState(null); // index into filtered list
  const [showUpload, setShowUpload] = React.useState(false);
  const [mob, setMob] = React.useState(window.innerWidth<=820 || /iPhone|iPad|Android/i.test(navigator.userAgent));

  React.useEffect(()=>{
    const fn = ()=>setMob(window.innerWidth<=820 || /iPhone|iPad|Android/i.test(navigator.userAgent));
    window.addEventListener('resize', fn);
    return ()=>window.removeEventListener('resize', fn);
  },[]);

  // Load shot list from Firestore (metadata) - images themselves are in Storage
  React.useEffect(()=>{
    const db = getDb();
    const unsub = db.collection('gallery_shots').orderBy('sceneNum').orderBy('shotNum')
      .onSnapshot(snap=>{
        const list = [];
        snap.forEach(doc=> list.push({id:doc.id, ...doc.data()}));
        setShots(list);
        setLoading(false);
      }, err=>{ console.warn(err); setLoading(false); });
    return unsub;
  },[]);

  const sceneNumbers = React.useMemo(()=>{
    const set = new Set(shots.map(s=>s.sceneNum).filter(n=>n!=null));
    return Array.from(set).sort((a,b)=>a-b);
  },[shots]);

  const filtered = React.useMemo(()=>{
    let list = shots;
    if(selScene!=='all') list = list.filter(s=>s.sceneNum===Number(selScene));
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(s=>
        String(s.sceneNum).includes(q) ||
        (s.desc||'').toLowerCase().includes(q) ||
        (s.raw||'').toLowerCase().includes(q)
      );
    }
    return list;
  },[shots, selScene, search]);

  const totalCount = shots.length;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',overflow:'hidden',
      animation:'fadeIn 0.3s ease'}}>

      {/* Header */}
      <div style={{flexShrink:0,borderBottom:'1px solid var(--border)',
        padding: mob ? '12px 14px' : '16px 28px',
        display:'flex',alignItems:'center',gap:14,flexWrap:'wrap',background:'var(--panel)'}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10,flexShrink:0}}>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',
            fontSize: mob?20:26,color:'var(--text)',whiteSpace:'nowrap'}}>Shot Reference</span>
          <span style={{fontSize:9,color:'var(--textDim)',letterSpacing:'0.08em'}}>
            {totalCount} IMAGES
          </span>
        </div>

        <div style={{flex:1,minWidth: mob ? '100%' : 200, display:'flex', gap:8, order: mob?3:0}}>
          <input
            value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search scene, shot, description..."
            style={{flex:1,background:'var(--panel2)',border:'1px solid var(--border)',
              borderRadius:7,padding:'7px 12px',fontSize:12,color:'var(--text)',outline:'none'}}/>
        </div>

        <select value={selScene} onChange={e=>{setSelScene(e.target.value); setSearch('');}}
          style={{background:'var(--panel2)',border:'1px solid var(--border)',borderRadius:7,
            padding:'7px 10px',fontSize:12,color:'var(--text)',flexShrink:0}}>
          <option value="all">All scenes ({sceneNumbers.length})</option>
          {sceneNumbers.map(n=>{
            const count = shots.filter(s=>s.sceneNum===n).length;
            return <option key={n} value={n}>Scene {n} ({count})</option>;
          })}
        </select>

        <button onClick={()=>setShowUpload(true)}
          style={{flexShrink:0,padding:'7px 16px',background:'var(--accent)',border:'none',
            borderRadius:7,color:'#15110a',fontSize:12,fontWeight:600,
            display:'flex',alignItems:'center',gap:6}}>
          + Upload
        </button>
      </div>

      {/* Scene quick-jump strip (desktop) */}
      {!mob && sceneNumbers.length>0 && (
        <div style={{flexShrink:0,borderBottom:'1px solid var(--border)',
          padding:'8px 28px',display:'flex',gap:5,overflowX:'auto',background:'var(--bg)'}}>
          <button onClick={()=>setSelScene('all')}
            style={{padding:'3px 11px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',
              background:selScene==='all'?'var(--accent)':'transparent',
              border:`1px solid ${selScene==='all'?'var(--accent)':'var(--border)'}`,
              color:selScene==='all'?'#15110a':'var(--textMute)'}}>
            ALL
          </button>
          {sceneNumbers.map(n=>(
            <button key={n} onClick={()=>setSelScene(String(n))}
              style={{padding:'3px 11px',borderRadius:99,fontSize:10,whiteSpace:'nowrap',
                background:selScene===String(n)?'var(--accent)':'transparent',
                border:`1px solid ${selScene===String(n)?'var(--accent)':'var(--border)'}`,
                color:selScene===String(n)?'#15110a':'var(--textMute)'}}>
              S{n}
            </button>
          ))}
        </div>
      )}

      {/* Grid */}
      <div style={{flex:1,overflow:'auto',padding: mob?'12px':'20px 28px'}}>
        {loading && (
          <div style={{textAlign:'center',padding:60,color:'var(--textDim)',fontSize:12}}>
            Loading...
          </div>
        )}
        {!loading && filtered.length===0 && (
          <div style={{textAlign:'center',padding:60,color:'var(--textDim)'}}>
            <div style={{fontSize:40,opacity:0.2,marginBottom:10}}>🎞</div>
            <div style={{fontSize:13}}>
              {shots.length===0 ? 'No images yet - tap + Upload to add references' : 'No matches found'}
            </div>
          </div>
        )}
        <div style={{display:'grid',
          gridTemplateColumns: mob ? 'repeat(2,1fr)' : 'repeat(auto-fill,minmax(190px,1fr))',
          gap: mob?8:14}}>
          {filtered.map((shot, idx)=>(
            <ShotThumb key={shot.id} shot={shot} onClick={()=>setLightbox(idx)} mob={mob}/>
          ))}
        </div>
      </div>

      {/* Lightbox */}
      {lightbox!==null && (
        <Lightbox
          shots={filtered}
          index={lightbox}
          onClose={()=>setLightbox(null)}
          onNav={(i)=>setLightbox(i)}
          mob={mob}/>
      )}

      {/* Upload modal */}
      {showUpload && (
        <UploadModal onClose={()=>setShowUpload(false)} mob={mob}/>
      )}
    </div>
  );
}

function ShotThumb({shot, onClick, mob}){
  const [loaded, setLoaded] = React.useState(false);
  return (
    <div onClick={onClick} style={{cursor:'pointer',animation:'slideUp 0.25s ease'}}>
      <div style={{position:'relative',aspectRatio:'16/9',borderRadius:8,overflow:'hidden',
        background:'var(--panel2)',border:'1px solid var(--border)'}}>
        {!loaded && <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',
          justifyContent:'center',color:'var(--textDim)',fontSize:9}}>...</div>}
        <img src={shot.thumbUrl||shot.url} alt={shot.desc} loading="lazy"
          onLoad={()=>setLoaded(true)}
          style={{width:'100%',height:'100%',objectFit:'cover',opacity:loaded?1:0,
            transition:'opacity 0.2s'}}/>
        <div style={{position:'absolute',top:6,left:6,background:'rgba(12,11,10,0.85)',
          borderRadius:4,padding:'2px 7px',fontSize:9,color:'var(--accent2)',fontWeight:600}}>
          S{shot.sceneNum}{shot.shotNum?'.'+shot.shotNum:''}
        </div>
      </div>
      <div style={{fontSize: mob?10:11,color:'var(--textMute)',marginTop:5,
        overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
        textTransform:'lowercase'}}>
        {shot.desc || 'untitled'}
      </div>
    </div>
  );
}

function Lightbox({shots, index, onClose, onNav, mob}){
  const shot = shots[index];
  const [imgLoaded, setImgLoaded] = React.useState(false);

  React.useEffect(()=>{ setImgLoaded(false); },[index]);

  React.useEffect(()=>{
    function onKey(e){
      if(e.key==='Escape') onClose();
      if(e.key==='ArrowLeft' && index>0) onNav(index-1);
      if(e.key==='ArrowRight' && index<shots.length-1) onNav(index+1);
    }
    window.addEventListener('keydown', onKey);
    return ()=>window.removeEventListener('keydown', onKey);
  },[index, shots.length]);

  // Touch swipe for mobile
  const touchStart = React.useRef(null);
  function onTouchStart(e){ touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e){
    if(touchStart.current==null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if(dx > 60 && index>0) onNav(index-1);
    if(dx < -60 && index<shots.length-1) onNav(index+1);
    touchStart.current = null;
  }

  if(!shot) return null;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.97)',zIndex:9000,
      display:'flex',flexDirection:'column',animation:'fadeIn 0.15s ease'}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

      {/* Top bar */}
      <div style={{flexShrink:0,padding: mob?'10px 12px':'14px 24px',
        display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:'var(--accent2)',fontWeight:600}}>
            SCENE {shot.sceneNum}{shot.shotNum?` · SHOT ${shot.shotNum}`:''}
          </div>
          <div style={{fontSize: mob?11:13,color:'var(--textMute)',marginTop:2,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {shot.desc||'untitled'}
          </div>
        </div>
        <div style={{fontSize:10,color:'var(--textDim)',flexShrink:0}}>
          {index+1} / {shots.length}
        </div>
        <button onClick={onClose}
          style={{flexShrink:0,width:34,height:34,borderRadius:'50%',
            background:'var(--panel2)',border:'1px solid var(--border)',
            color:'var(--textMute)',fontSize:16,display:'grid',placeItems:'center'}}>
          x
        </button>
      </div>

      {/* Image area */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
        position:'relative',overflow:'hidden',padding: mob?'0 8px':'0 80px'}}>

        {!mob && index>0 && (
          <button onClick={()=>onNav(index-1)}
            style={{position:'absolute',left:16,top:'50%',transform:'translateY(-50%)',
              width:48,height:48,borderRadius:'50%',background:'var(--panel2)',
              border:'1px solid var(--border)',color:'var(--text)',fontSize:20,
              display:'grid',placeItems:'center',zIndex:10}}>
            ‹
          </button>
        )}

        {!imgLoaded && <div style={{position:'absolute',color:'var(--textDim)',fontSize:11}}>Loading...</div>}
        <img src={shot.url} alt={shot.desc}
          onLoad={()=>setImgLoaded(true)}
          style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',
            opacity:imgLoaded?1:0,transition:'opacity 0.2s',borderRadius:4}}/>

        {!mob && index<shots.length-1 && (
          <button onClick={()=>onNav(index+1)}
            style={{position:'absolute',right:16,top:'50%',transform:'translateY(-50%)',
              width:48,height:48,borderRadius:'50%',background:'var(--panel2)',
              border:'1px solid var(--border)',color:'var(--text)',fontSize:20,
              display:'grid',placeItems:'center',zIndex:10}}>
            ›
          </button>
        )}
      </div>

      {/* Mobile bottom nav */}
      {mob && (
        <div style={{flexShrink:0,padding:'10px 16px',
          paddingBottom:'calc(env(safe-area-inset-bottom) + 10px)',
          display:'flex',gap:10}}>
          <button onClick={()=>index>0&&onNav(index-1)} disabled={index===0}
            style={{flex:1,padding:'10px 0',background:'var(--panel2)',
              border:'1px solid var(--border)',borderRadius:8,
              color: index===0?'var(--textDim)':'var(--text)',fontSize:13}}>
            ‹ Prev
          </button>
          <button onClick={()=>index<shots.length-1&&onNav(index+1)} disabled={index===shots.length-1}
            style={{flex:1,padding:'10px 0',background:'var(--panel2)',
              border:'1px solid var(--border)',borderRadius:8,
              color: index===shots.length-1?'var(--textDim)':'var(--text)',fontSize:13}}>
            Next ›
          </button>
        </div>
      )}
    </div>
  );
}


/* ═══════════════════════════════════════════════════════════
   UPLOAD MODAL - batch upload with filename parsing
═══════════════════════════════════════════════════════════ */
function UploadModal({onClose, mob}){
  const [files, setFiles] = React.useState([]); // [{file, parsed, status, progress}]
  const [dragOver, setDragOver] = React.useState(false);
  const [uploading, setUploading] = React.useState(false);
  const [done, setDone] = React.useState(0);
  const fileInputRef = React.useRef(null);

  function handleFiles(fileList){
    const arr = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
    const parsed = arr.map(f=>({
      file: f,
      parsed: parseFilename(f.name),
      status: 'pending', // pending | uploading | done | error
      previewUrl: URL.createObjectURL(f),
    }));
    setFiles(prev => [...prev, ...parsed]);
  }

  function onDrop(e){
    e.preventDefault(); setDragOver(false);
    handleFiles(e.dataTransfer.files);
  }

  function removeFile(idx){
    setFiles(prev => prev.filter((_,i)=>i!==idx));
  }

  function updateParsed(idx, patch){
    setFiles(prev => prev.map((f,i)=> i===idx ? {...f, parsed:{...f.parsed,...patch}} : f));
  }

  async function uploadAll(){
    setUploading(true);
    setDone(0);
    const storage = getStorage();
    const db = getDb();

    for(let i=0; i<files.length; i++){
      const item = files[i];
      if(item.status==='done') { setDone(d=>d+1); continue; }
      setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'uploading'} : f));

      try {
        const timestamp = Date.now();
        const safeName = item.file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
        const path = `shot_refs/${timestamp}_${safeName}`;
        const ref = storage.ref(path);
        await ref.put(item.file);
        const url = await ref.getDownloadURL();

        await db.collection('gallery_shots').add({
          sceneNum: item.parsed.sceneNum,
          shotNum: item.parsed.shotNum,
          desc: item.parsed.desc,
          raw: item.file.name,
          url,
          path,
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });

        setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'done'} : f));
        setDone(d=>d+1);
      } catch(e){
        console.error('Upload error:', e);
        setFiles(prev => prev.map((f,idx)=> idx===i ? {...f,status:'error'} : f));
      }
    }
    setUploading(false);
  }

  const allDone = files.length>0 && files.every(f=>f.status==='done');
  const validCount = files.filter(f=>f.parsed.valid).length;
  const invalidCount = files.length - validCount;

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(8,7,6,0.85)',zIndex:9500,
      display:'flex',alignItems: mob?'flex-end':'center',justifyContent:'center'}}
      onClick={e=>{if(e.target===e.currentTarget && !uploading)onClose();}}>
      <div style={{background:'var(--panel)',border:'1px solid var(--borderHi)',
        borderRadius: mob?'16px 16px 0 0':14,
        width: mob?'100%':640, maxHeight: mob?'90vh':'85vh',
        display:'flex',flexDirection:'column',overflow:'hidden',
        boxShadow:'0 12px 50px rgba(0,0,0,0.5)'}}>

        {/* Header */}
        <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
          <span style={{fontFamily:"'Instrument Serif',serif",fontStyle:'italic',
            fontSize:18,color:'var(--text)',flex:1}}>
            Upload Shot References
          </span>
          {!uploading && (
            <button onClick={onClose}
              style={{color:'var(--textDim)',fontSize:18,background:'transparent',
                border:'none'}}>x</button>
          )}
        </div>

        <div style={{flex:1,overflow:'auto',padding:'16px 20px'}}>

          {/* Drop zone */}
          {files.length===0 && (
            <div
              onDragOver={e=>{e.preventDefault(); setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={onDrop}
              onClick={()=>fileInputRef.current?.click()}
              style={{border:`2px dashed ${dragOver?'var(--accent)':'var(--border)'}`,
                borderRadius:10,padding: mob?'40px 16px':'60px 20px',textAlign:'center',
                cursor:'pointer',background: dragOver?'rgba(217,142,63,0.06)':'transparent',
                transition:'all 0.15s'}}>
              <div style={{fontSize:36,opacity:0.3,marginBottom:10}}>📁</div>
              <div style={{fontSize:13,color:'var(--textMute)',marginBottom:4}}>
                {mob ? 'Tap to select photos' : 'Drag images here or click to browse'}
              </div>
              <div style={{fontSize:10,color:'var(--textDim)'}}>
                Filenames like "60_3_description.png" auto-detect scene + shot
              </div>
            </div>
          )}
          <input ref={fileInputRef} type="file" accept="image/*" multiple
            onChange={e=>handleFiles(e.target.files)} style={{display:'none'}}/>

          {/* File list */}
          {files.length>0 && (
            <>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                marginBottom:10}}>
                <div style={{fontSize:11,color:'var(--textMute)'}}>
                  {files.length} files selected
                  {invalidCount>0 && <span style={{color:'var(--danger)'}}> · {invalidCount} need review</span>}
                </div>
                {!uploading && (
                  <button onClick={()=>fileInputRef.current?.click()}
                    style={{fontSize:10,color:'var(--info)',background:'transparent',border:'none'}}>
                    + Add more
                  </button>
                )}
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {files.map((item, idx)=>(
                  <FileRow key={idx} item={item} idx={idx}
                    onRemove={()=>removeFile(idx)}
                    onUpdate={(patch)=>updateParsed(idx, patch)}
                    disabled={uploading}/>
                ))}
              </div>
            </>
          )}
        </div>

        {/* Footer */}
        {files.length>0 && (
          <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',
            display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            {uploading && (
              <div style={{flex:1,fontSize:11,color:'var(--textMute)'}}>
                Uploading {done}/{files.length}...
              </div>
            )}
            {!uploading && !allDone && (
              <div style={{flex:1,fontSize:11,color:'var(--textDim)'}}>
                Ready to upload {files.length} image{files.length>1?'s':''}
              </div>
            )}
            {allDone && (
              <div style={{flex:1,fontSize:11,color:'var(--success)'}}>
                ✓ All uploaded successfully
              </div>
            )}
            {!allDone ? (
              <button onClick={uploadAll} disabled={uploading || files.length===0}
                style={{padding:'9px 22px',background:'var(--accent)',border:'none',
                  borderRadius:7,color:'#15110a',fontSize:12,fontWeight:600,
                  opacity:uploading?0.6:1}}>
                {uploading ? 'Uploading...' : `Upload ${files.length} image${files.length>1?'s':''}`}
              </button>
            ) : (
              <button onClick={onClose}
                style={{padding:'9px 22px',background:'var(--accent)',border:'none',
                  borderRadius:7,color:'#15110a',fontSize:12,fontWeight:600}}>
                Done
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function FileRow({item, idx, onRemove, onUpdate, disabled}){
  const [editing, setEditing] = React.useState(false);
  const p = item.parsed;

  const statusIcon = {
    pending: null,
    uploading: <div style={{width:12,height:12,border:'2px solid var(--info)',
      borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.6s linear infinite'}}/>,
    done: <span style={{color:'var(--success)',fontSize:13}}>✓</span>,
    error: <span style={{color:'var(--danger)',fontSize:13}}>✕</span>,
  }[item.status];

  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',
      background:'var(--panel2)',border:`1px solid ${p.valid?'var(--border)':'var(--danger)'}`,
      borderRadius:8}}>
      <img src={item.previewUrl} alt=""
        style={{width:44,height:44,objectFit:'cover',borderRadius:5,flexShrink:0}}/>

      <div style={{flex:1,minWidth:0}}>
        {!editing ? (
          <>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:11,fontWeight:600,
                color: p.valid?'var(--accent2)':'var(--danger)'}}>
                {p.valid ? `S${p.sceneNum}${p.shotNum?'.'+p.shotNum:''}` : 'Unparsed'}
              </span>
              {!p.valid && <span style={{fontSize:9,color:'var(--danger)'}}>tap to set scene</span>}
            </div>
            <div style={{fontSize:10,color:'var(--textDim)',overflow:'hidden',
              textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {p.desc || item.file.name}
            </div>
          </>
        ) : (
          <div style={{display:'flex',gap:6}}>
            <input type="number" placeholder="Scene" value={p.sceneNum||''}
              onChange={e=>onUpdate({sceneNum: e.target.value?parseInt(e.target.value):null, valid:true})}
              style={{width:60,background:'var(--bg)',border:'1px solid var(--border)',
                borderRadius:4,padding:'4px 6px',fontSize:11,color:'var(--text)'}}/>
            <input type="number" placeholder="Shot" value={p.shotNum||''}
              onChange={e=>onUpdate({shotNum: e.target.value?parseInt(e.target.value):0})}
              style={{width:50,background:'var(--bg)',border:'1px solid var(--border)',
                borderRadius:4,padding:'4px 6px',fontSize:11,color:'var(--text)'}}/>
            <input type="text" placeholder="Description" value={p.desc||''}
              onChange={e=>onUpdate({desc: e.target.value})}
              style={{flex:1,background:'var(--bg)',border:'1px solid var(--border)',
                borderRadius:4,padding:'4px 6px',fontSize:11,color:'var(--text)',minWidth:0}}/>
          </div>
        )}
      </div>

      {statusIcon}

      {!disabled && (
        <>
          <button onClick={()=>setEditing(e=>!e)}
            style={{color:'var(--textDim)',fontSize:11,background:'transparent',
              border:'none',flexShrink:0}}>
            {editing?'✓':'✎'}
          </button>
          <button onClick={onRemove}
            style={{color:'var(--textDim)',fontSize:14,background:'transparent',
              border:'none',flexShrink:0}}>
            x
          </button>
        </>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
